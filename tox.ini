[tox]
isolated_build = False
env_list = format,lint,mypy,psp-linter,test
skip_missing_interpreters = true

[testenv]
description = Run system tests with optional setup and teardown
package = skip
passenv =
    APP_URL
    APP_TOKEN
    TC_POLARION_IMAGE_NAME
    TC_WEASYPRINT_SERVICE_IMAGE_NAME
    TC_EXTENSION_VERSION
    TC_ADDITIONAL_BUNDLES
    TC_ADMIN_UTILITY_VERSION
    TC_TEST_DATA_VERSION
    IO_JFROG_SBB_POLARION_TOKEN
    UV_INDEX_POLARION_PYPI_USERNAME
    UV_INDEX_POLARION_PYPI_PASSWORD
set_env =
    MAVEN_ARGS = --batch-mode
    TZ = Europe/Zurich
allowlist_externals =
    uv
    bash
commands_pre =
    bash -c 'if [ -f tests/setup.py ]; then uv run python tests/setup.py {posargs}; fi'
commands =
    uv run python tests/run.py {posargs}
commands_post =
    bash -c 'if [ -f tests/teardown.py ]; then uv run python tests/teardown.py {posargs}; fi'

[testenv:lint]
description = Run ruff linter
allowlist_externals = uv
commands_pre =
commands = uv run ruff check .
commands_post =
skip_install = true

[testenv:format]
description = Run ruff formatter
allowlist_externals = uv
commands_pre =
commands = uv run ruff format .
commands_post =
skip_install = true

[testenv:mypy]
description = Run mypy type checker
allowlist_externals = uv
commands_pre =
commands = uv run mypy tests/
commands_post =
skip_install = true

[testenv:psp-linter]
description = Run python-sbb-polarion linter
allowlist_externals = uv
commands_pre =
commands = uv run python-sbb-polarion-lint tests/
commands_post =
skip_install = true
