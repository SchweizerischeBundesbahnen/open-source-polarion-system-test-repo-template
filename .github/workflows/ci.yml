---
name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
jobs:
  verify-with-tox:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Required for SonarCloud to comment on PRs and update status
    steps:
      - name: 📄 Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history required for SonarCloud analysis
      - name: Set up Python from .tool-versions
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: .tool-versions
      - name: 🧱 Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - name: 🧱 Install dependencies
        run: uv sync --frozen
      - name: 🔍 Run static checks (ruff lint + format, mypy, psp-linter)
        # The Polarion-dependent `test` env runs in system-tests.yml (containerized) and nightly on
        # Jenkins. Static checks run here so lint/type/format regressions are caught on the PR.
        run: |
          uv run tox -e lint,mypy,psp-linter
          uv run ruff format --check --diff .
      - name: SonarCloud scan for PR
        uses: sonarsource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2.1
        if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: |
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}
      - name: SonarCloud scan for Push
        uses: sonarsource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2.1
        if: github.event_name == 'push' && github.event.repository.visibility == 'public'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: |
            -Dsonar.branch.name=${{ github.ref_name }}
