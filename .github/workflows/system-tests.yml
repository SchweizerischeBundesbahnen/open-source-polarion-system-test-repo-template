---
name: System Tests (Polarion in Docker)
# Integration tests for pull requests: spin up Polarion in Docker (via the testcontainers
# harness in tests/run.py) and run the system tests against pinned extension versions
# (see env below). This is the merge gate, so PRs do not depend on the availability of the
# long-lived Polarion SUT (which Jenkins exercises nightly instead).
#
# TEMPLATE: pin the versions/images for your extension below. TC_EXTENSION_VERSION is the
# version of the extension under test that gets installed into the container.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: system-tests-${{ github.ref }}
  cancel-in-progress: true
env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: temurin
  # TEMPLATE: the worked example has no dedicated extension under test, so TC_EXTENSION_VERSION
  # matches TC_TEST_DATA_VERSION (EXTENSION_NAME is "test-data"). Set these to the versions for
  # the extension under test and its companions. Keep TC_EXTENSION_VERSION == TC_TEST_DATA_VERSION
  # only while EXTENSION_NAME stays "test-data" (otherwise two test-data jars would clash).
  TC_EXTENSION_VERSION: 5.0.0
  TC_ADMIN_UTILITY_VERSION: 5.0.0
  TC_TEST_DATA_VERSION: 5.0.0
  TC_POLARION_IMAGE_NAME: sbb.jfrog.io/polarion-docker/polarion/polarion:2606-0
  # TEMPLATE: only needed for extensions that depend on the WeasyPrint service. Set
  # TC_WEASYPRINT_SERVICE_IMAGE_NAME to bind a WeasyPrint container to the Polarion container
  # (the worked example does not need it).
jobs:
  system-tests:
    # Skip draft PRs (this container suite is expensive); still runs on manual workflow_dispatch.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IO_JFROG_SBB_POLARION_TOKEN: ${{ secrets.IO_JFROG_SBB_POLARION_TOKEN }}
    steps:
      - name: 📄 Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false
      - name: 🐍 Set up Python from .tool-versions
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: .tool-versions
      - name: 🧱 Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - name: ☕ Set up JDK and Maven
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: 🔐 Configure Maven settings.xml (from repo .mvn/settings.xml)
        run: |
          mkdir -p "$HOME/.m2"
          cp "$GITHUB_WORKSPACE/.mvn/settings.xml" "$HOME/.m2/settings.xml"
      - name: 🐳 Log in to sbb.jfrog.io Docker registry
        run: |
          # Token-only auth (same token as the Maven X-JFrog-Art-Api header). For a JFrog access
          # token the username is not validated, so a fixed placeholder is enough.
          printf '%s' "$IO_JFROG_SBB_POLARION_TOKEN" | docker login sbb.jfrog.io -u polarion --password-stdin
      - name: 🧱 Install dependencies
        run: uv sync --frozen
      - name: 🧪 Run system tests against Polarion in Docker
        run: uv run tox -e test
      - name: 📤 Upload test reports and generated artifacts
        # Always upload so failures can be diagnosed: the output folder contains whatever the
        # tests generate (exports, rendered pages, diffs, ...).
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: system-test-reports
          path: |
            TEST-*.xml
            test-data/output/**
          if-no-files-found: warn
          retention-days: 7
