---
name: System Tests (Polarion in Docker)
# Integration tests for pull requests: spin up Polarion in Docker (via the testcontainers
# harness in tests/run.py) and run the system tests against pinned extension versions
# (see env below). This is the merge gate, so PRs do not depend on the availability of a
# persistent Polarion instance (which Jenkins exercises nightly instead).
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  # Run the suite on Renovate's own branches so branch-automerge bumps
  # (automergeType: branch in renovate.json) are exercised by system-tests
  # before Renovate fast-forwards them into main. Renovate opens no PR for
  # these, so the pull_request trigger above never fires for them.
  push:
    branches: ['renovate/**']
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: system-tests-${{ github.ref }}
  cancel-in-progress: true
env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: temurin
  # TEMPLATE: version of the bundle under test (EXTENSION_NAME). The worked example uses
  # "test-data", so this mirrors TC_TEST_DATA_VERSION; set it to your extension's version.
  TC_EXTENSION_VERSION: 5.0.0
  TC_ADMIN_UTILITY_VERSION: 5.0.0
  TC_TEST_DATA_VERSION: 5.0.2
  TC_POLARION_IMAGE_NAME: sbb.jfrog.io/polarion-docker/polarion/polarion:2606-0
jobs:
  system-tests:
    # Skip draft PRs (this container suite is expensive); still runs on manual workflow_dispatch.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IO_JFROG_SBB_POLARION_TOKEN: ${{ secrets.IO_JFROG_SBB_POLARION_TOKEN }}
    steps:
      - name: 📄 Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false
      - name: 🐍 Set up Python from .tool-versions
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: .tool-versions
      - name: 🧱 Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - name: ☕ Set up JDK and Maven
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: 🔐 Configure Maven settings.xml (from repo .mvn/settings.xml)
        run: |
          mkdir -p "$HOME/.m2"
          cp "$GITHUB_WORKSPACE/.mvn/settings.xml" "$HOME/.m2/settings.xml"
      - name: 🐳 Log in to sbb.jfrog.io Docker registry
        run: |
          # Token-only auth (same token as the Maven X-JFrog-Art-Api header). For a JFrog access
          # token the username is not validated, so a fixed placeholder is enough.
          printf '%s' "$IO_JFROG_SBB_POLARION_TOKEN" | docker login sbb.jfrog.io -u polarion --password-stdin
      - name: 🧱 Install dependencies
        run: uv sync --frozen
      - name: 🧪 Run system tests against Polarion in Docker
        run: uv run tox -e test
      - name: 📤 Upload test reports and generated artifacts
        # Always upload so failures can be diagnosed: the output folder contains whatever the
        # tests generate (exports, rendered pages, diffs, ...).
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: system-test-reports
          path: |
            TEST-*.xml
            test-data/output/**
          if-no-files-found: warn
          retention-days: 7
