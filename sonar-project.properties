sonar.projectKey=SchweizerischeBundesbahnen_open-source-polarion-system-test-repo-template
sonar.organization=schweizerischebundesbahnen

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=open-source-polarion-system-test-repo-template
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=tests

# Exclude CI/workflow definitions from analysis
sonar.exclusions=.github/**

# System-test repositories produce no unit-test coverage: the suite requires a running Polarion
# and executes in system-tests.yml without coverage instrumentation. Exclude all files from
# coverage so the quality gate's coverage condition does not apply (reported as N/A, not 0%).
# Remove this if you wire up coverage reporting for the suite.
sonar.coverage.exclusions=**

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Additional parameters
sonar.python.xunit.reportPaths=junittest.xml
sonar.python.coverage.reportPaths=coverage.xml
#sonar.branch.target = main
#sonar.test.exclusions=tests/**
#sonar.tests=tests/
sonar.python.version=3.13
sonar.qualitygate.wait=true
